name: generate assets

on:
  schedule:
    - cron: "0 */24 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # 1. توليد الثعبان (Snake)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 2. تحميل البانر العلوي (Header) وحفظه كملف
      - name: Generate Header
        run: |
          mkdir -p dist
          curl "https://capsule-render.vercel.app/render?type=waving&color=87CEEB&height=200&section=header&text=Insaf%20Alrumi&fontSize=50&animation=fadeIn&fontColor=ffffff" > dist/header.svg

      # 3. رفع الملفات لفرع الـ output
      - name: push assets to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
